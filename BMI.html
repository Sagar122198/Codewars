<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>family age</title>
</head>

<body>
    <script>
        // My solution========>
        function bmi(weight, height) {
            var result = weight / Math.pow(height, 2)

            if (result <= 18.5) {
                return "Underweight";
            } else if (result <= 25) {
                return "Normal";
            } else if (result <= 30) {
                return "Overweight";
            } else {
                return "Obese";
            }

        }

        // Other solutions===========>
        const bmi = (w, h, bmi = w/h/h) =>  bmi <= 18.5 ? "Underweight" :
                                    bmi <= 25 ? "Normal" :
                                    bmi <= 30 ? "Overweight" : "Obese";
    </script>
</body>

</html>
